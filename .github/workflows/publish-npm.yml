name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.8.0) — must already exist as a GitHub release'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required so GitHub can issue an OIDC token for npm trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Trusted publishing requires npm CLI 11.5.1+ and Node 22.14.0+;
      # Node 24's bundled npm already satisfies both, so no separate
      # "upgrade npm" step is needed the way it was under Node 20.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never use caching in release builds

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "Release tag ($TAG_NAME) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test

      # No NODE_AUTH_TOKEN / NPM_TOKEN needed: npm exchanges the OIDC token
      # from id-token: write above for a short-lived publish credential,
      # once this repo + workflow is configured as a Trusted Publisher on
      # the package's npm settings page. Provenance attestation happens
      # automatically for trusted-publishing releases of public packages
      # from a public repo, so --provenance isn't required, but it's kept
      # explicit since some setups have needed it.
      - name: Publish to npm
        run: npm publish --provenance
