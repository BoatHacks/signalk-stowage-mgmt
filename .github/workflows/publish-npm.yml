name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.8.0) — must already exist as a GitHub release'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required so GitHub can issue an OIDC token for npm trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "Release tag ($TAG_NAME) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      # Trusted publishing needs npm 11.5.1+; Node 20's bundled npm predates that.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install --omit=dev

      # No NODE_AUTH_TOKEN / NPM_TOKEN needed: npm exchanges the OIDC token
      # from id-token: write above for a short-lived publish credential,
      # once this repo + workflow is configured as a Trusted Publisher on
      # the package's npm settings page. --provenance is redundant with
      # trusted publishing in principle (provenance attestation happens
      # automatically) but kept explicit since some setups have needed it.
      - name: Publish to npm
        run: npm publish --provenance
