name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.8.0) — must already exist as a GitHub release'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # needed to look up the Plugin CI workflow run for this commit
      id-token: write # required so GitHub can issue an OIDC token for npm trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Refuse to publish unless Plugin CI (.github/workflows/plugin-ci.yml)
      # has actually completed successfully for this exact commit. Checked
      # via the Actions API rather than a `needs:`/workflow_run dependency
      # since this workflow is triggered by a GitHub release (or a manual
      # retry with an arbitrary past tag), not by Plugin CI itself finishing.
      - name: Verify Plugin CI succeeded for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Commit: $SHA"
          CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/workflows/plugin-ci.yml/runs?head_sha=${SHA}&status=completed&per_page=1" --jq '.workflow_runs[0].conclusion // "none"')
          echo "Plugin CI conclusion for this commit: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Plugin CI has not completed successfully for commit $SHA (conclusion: $CONCLUSION). Refusing to publish."
            exit 1
          fi

      # Trusted publishing requires npm CLI 11.5.1+ and Node 22.14.0+;
      # Node 24's bundled npm already satisfies both, so no separate
      # "upgrade npm" step is needed the way it was under Node 20.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never use caching in release builds

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "Release tag ($TAG_NAME) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test

      # No NODE_AUTH_TOKEN / NPM_TOKEN needed: npm exchanges the OIDC token
      # from id-token: write above for a short-lived publish credential,
      # once this repo + workflow is configured as a Trusted Publisher on
      # the package's npm settings page. Provenance attestation happens
      # automatically for trusted-publishing releases of public packages
      # from a public repo, so --provenance isn't required, but it's kept
      # explicit since some setups have needed it.
      - name: Publish to npm
        run: npm publish --provenance
